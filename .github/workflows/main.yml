name: Build App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install Flet
        run: pip install flet requests
      - name: Build APK
        run: flet build apk
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: app-release
          path: build/apk/*.apk
